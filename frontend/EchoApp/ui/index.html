<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Echo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            overflow: hidden;
            background: transparent;
        }

        body {
            font-family: 'Segoe UI Variable Display', 'Segoe UI', sans-serif;
            color: #1a1a1a;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background:
                linear-gradient(
                    160deg,
                    rgba(255,255,255,0.13) 0%,
                    rgba(255,255,255,0.04) 100%
                );
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 12px;
            overflow: hidden;
            box-shadow:
                0 0 0 0.5px rgba(255,255,255,0.08) inset,
                0 32px 80px rgba(0,0,0,0.55),
                0 8px 24px rgba(0,0,0,0.3);
            backdrop-filter: blur(40px) saturate(180%) brightness(1.1);
            -webkit-backdrop-filter: blur(40px) saturate(180%) brightness(1.1);
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 16px;
            right: 16px;
            height: 1px;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255,255,255,0.35) 30%,
                rgba(255,255,255,0.35) 70%,
                transparent
            );
            z-index: 10;
            pointer-events: none;
            border-radius: 1px;
        }

        .search-bar {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 18px 24px;
            border-bottom: 1px solid rgba(0,0,0,0.08);
            background: rgba(255,255,255,0.06);
            flex-shrink: 0;
        }

        .search-icon {
            display: flex;
            align-items: center;
            flex-shrink: 0;
            opacity: 0.4;
        }

        .search-icon svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: #1a1a1a;
            stroke-width: 2;
            stroke-linecap: round;
        }

        #search-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            font-size: 18px;
            font-family: inherit;
            font-weight: 400;
            color: #1a1a1a;
            caret-color: #0078d4;
        }

        #search-input::placeholder {
            color: rgba(0,0,0,0.3);
        }

        #status {
            font-size: 10.5px;
            color: rgba(0,0,0,0.4);
            padding: 10px 24px 4px;
            min-height: 28px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-weight: 600;
            flex-shrink: 0;
        }

        #results-grid {
            display: none;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: 228px;
            gap: 10px;
            padding: 8px 20px 20px;
            overflow-y: auto;
            flex: 1;
        }

        .result-item {
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            background: rgba(0,0,0,0.06);
            border: 1px solid rgba(0,0,0,0.06);
            transition:
                filter 0.18s ease,
                box-shadow 0.18s ease,
                border-color 0.18s ease;
        }

        .result-item:hover {
            filter: brightness(1.08);
            box-shadow: 0 6px 24px rgba(0,0,0,0.2);
            border-color: rgba(0,0,0,0.12);
        }

        .result-item:active {
            filter: brightness(0.95);
        }

        .result-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .result-item .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 24px 8px 8px;
            background: linear-gradient(transparent, rgba(0,0,0,0.65));
            font-size: 11px;
            opacity: 0;
            transition: opacity 0.15s ease;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: rgba(255,255,255,0.95);
        }

        .result-item:hover .overlay {
            opacity: 1;
        }

        #empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            gap: 12px;
            color: rgba(0,0,0,0.2);
        }

        #empty-state svg {
            width: 40px;
            height: 40px;
            stroke: rgba(0,0,0,0.15);
            fill: none;
            stroke-width: 1.5;
            stroke-linecap: round;
        }

        #empty-state p {
            font-size: 13px;
            font-weight: 400;
            letter-spacing: 0.04em;
        }

        #context-menu {
            display: none;
            position: fixed;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 10px;
            padding: 4px;
            z-index: 1000;
            min-width: 190px;
            box-shadow: 0 16px 48px rgba(0,0,0,0.2);
        }

        .context-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            color: rgba(0,0,0,0.85);
            transition: background 0.1s ease;
        }

        .context-item svg {
            stroke: rgba(0,0,0,0.6);
        }

        .context-item:hover {
            background: rgba(0,0,0,0.06);
        }

        .context-separator {
            height: 1px;
            background: rgba(0,0,0,0.08);
            margin: 3px 8px;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb {
            background: rgba(0,0,0,0.15);
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div class="search-bar">
        <span class="search-icon">
            <svg viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="7"/>
                <line x1="16.5" y1="16.5" x2="22" y2="22"/>
            </svg>
        </span>
        <input
            type="text"
            id="search-input"
            placeholder="Locate with Echo..."
            autofocus
            spellcheck="false"
            autocomplete="off"
        />
    </div>

    <div id="status"></div>
    <div id="results-grid"></div>

    <div id="empty-state">
        <svg viewBox="0 0 24 24">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
        </svg>
        <p>Type to search </p>
    </div>

    <div id="context-menu">
        <div class="context-item" id="ctx-open">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/>
                <polyline points="15 3 21 3 21 9"/>
                <line x1="10" y1="14" x2="21" y2="3"/>
            </svg>
            Open
        </div>
        <div class="context-separator"></div>
        <div class="context-item" id="ctx-folder">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/>
            </svg>
            Show in folder
        </div>
    </div>

    <script>
        const input = document.getElementById('search-input');
        const grid = document.getElementById('results-grid');
        const status = document.getElementById('status');
        const contextMenu = document.getElementById('context-menu');
        const emptyState = document.getElementById('empty-state');

        let debounceTimer;
        let selectedPath = null;

        window.addEventListener('load', () => input.focus());

        input.addEventListener('input', () => {
            clearTimeout(debounceTimer);
            const query = input.value.trim();

            if (!query) {
                grid.innerHTML = '';
                grid.style.display = 'none';
                status.textContent = '';
                emptyState.style.display = 'flex';
                return;
            }

            status.textContent = 'Searching...';
            emptyState.style.display = 'none';
            grid.style.display = 'grid';
            debounceTimer = setTimeout(() => search(query), 200);
        });

        async function search(query) {
            try {
                const raw = window.chrome.webview.hostObjects.echo.Search(query);
                const data = JSON.parse(await raw);
                renderResults(data.results);
            } catch (e) {
                status.textContent = 'Backend not available';
            }
        }

        function renderResults(results) {
            grid.innerHTML = '';

            if (!results || results.length === 0) {
                status.textContent = 'No results found';
                return;
            }

            status.textContent = `${results.length} results`;

            results.forEach(r => {
                const item = document.createElement('div');
                item.className = 'result-item';

                const thumbnailUrl = window.chrome.webview.hostObjects.sync.echo.GetThumbnail(r.path);
                const filename = r.path.split('\\').pop();

                item.innerHTML = `
                    <img src="${thumbnailUrl}" alt="${filename}" loading="lazy" />
                    <div class="overlay">${filename}</div>
                `;

                item.addEventListener('click', () => {
                    window.chrome.webview.hostObjects.sync.echo.OpenFile(r.path);
                });

                item.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    selectedPath = r.path;
                    contextMenu.style.display = 'block';
                    contextMenu.style.left = e.clientX + 'px';
                    contextMenu.style.top = e.clientY + 'px';
                });

                grid.appendChild(item);
            });
        }

        document.getElementById('ctx-open').addEventListener('click', () => {
            if (selectedPath) window.chrome.webview.hostObjects.sync.echo.OpenFile(selectedPath);
            contextMenu.style.display = 'none';
        });

        document.getElementById('ctx-folder').addEventListener('click', () => {
            if (selectedPath) window.chrome.webview.hostObjects.sync.echo.OpenInFolder(selectedPath);
            contextMenu.style.display = 'none';
        });

        document.addEventListener('click', () => {
            contextMenu.style.display = 'none';
        });
    </script>
</body>
</html>
