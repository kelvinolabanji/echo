<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI Variable', 'Segoe UI', sans-serif;
            background: rgba(32, 32, 32, 0.95);
            color: #fff;
            height: 100vh;
            overflow: hidden;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        #search-container {
            padding: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #search-icon {
            opacity: 0.5;
            font-size: 18px;
            flex-shrink: 0;
        }

        #search-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            font-size: 18px;
            font-family: inherit;
            color: #fff;
            caret-color: #0078d4;
        }

        #search-input::placeholder {
            color: rgba(255,255,255,0.3);
        }

        #status {
            font-size: 12px;
            color: rgba(255,255,255,0.3);
            padding: 8px 16px;
            min-height: 28px;
        }

        #results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 8px;
            padding: 8px 16px 16px;
            overflow-y: auto;
            max-height: calc(100vh - 100px);
        }

        .result-item {
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            aspect-ratio: 1;
            background: rgba(255,255,255,0.05);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .result-item:hover {
            transform: scale(1.03);
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        .result-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .result-item .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 6px 8px;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
            font-size: 11px;
            opacity: 0;
            transition: opacity 0.15s ease;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .result-item:hover .overlay {
            opacity: 1;
        }

        /* Custom context menu */
        #context-menu {
            display: none;
            position: fixed;
            background: #2c2c2c;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 4px;
            z-index: 1000;
            min-width: 180px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        .context-item {
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            color: rgba(255,255,255,0.9);
        }

        .context-item:hover {
            background: rgba(255,255,255,0.08);
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
    </style>
</head>
<body>
    <div id="search-container">
        <span id="search-icon">🔍</span>
        <input 
            type="text" 
            id="search-input" 
            placeholder="Search your photos..."
            autofocus
        />
    </div>

    <div id="status"></div>

    <div id="results-grid"></div>

    <div id="context-menu">
        <div class="context-item" id="ctx-open">Open</div>
        <div class="context-item" id="ctx-folder">Show in folder</div>
    </div>

    <script>
        const input = document.getElementById('search-input');
        const grid = document.getElementById('results-grid');
        const status = document.getElementById('status');
        const contextMenu = document.getElementById('context-menu');

        let debounceTimer;
        let selectedPath = null;

        // Auto focus on load
        window.addEventListener('load', () => input.focus());

        // Search as you type
        input.addEventListener('input', () => {
            clearTimeout(debounceTimer);
            const query = input.value.trim();

            if (!query) {
                grid.innerHTML = '';
                status.textContent = '';
                return;
            }

            status.textContent = 'Searching...';
            debounceTimer = setTimeout(() => search(query), 200);
        });

        async function search(query) {
            try {
                const raw = window.chrome.webview.hostObjects.echo.Search(query);
                const data = JSON.parse(await raw);
                renderResults(data.results);
            } catch (e) {
                status.textContent = 'Backend not available';
            }
        }

        function renderResults(results) {
            grid.innerHTML = '';

            if (!results || results.length === 0) {
                status.textContent = 'No results found';
                return;
            }

            status.textContent = `${results.length} results`;

            results.forEach(r => {
                const item = document.createElement('div');
                item.className = 'result-item';

                const thumbnailUrl = window.chrome.webview.hostObjects.sync.echo.GetThumbnail(r.path);
                const filename = r.path.split('\\').pop();

                item.innerHTML = `
                    <img src="${thumbnailUrl}" alt="${filename}" loading="lazy" />
                    <div class="overlay">${filename}</div>
                `;

                // Left click — open file
                item.addEventListener('click', () => {
                    window.chrome.webview.hostObjects.sync.echo.OpenFile(r.path);
                });

                // Right click — context menu
                item.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    selectedPath = r.path;
                    contextMenu.style.display = 'block';
                    contextMenu.style.left = e.clientX + 'px';
                    contextMenu.style.top = e.clientY + 'px';
                });

                grid.appendChild(item);
            });
        }

        // Context menu actions
        document.getElementById('ctx-open').addEventListener('click', () => {
            if (selectedPath) window.chrome.webview.hostObjects.sync.echo.OpenFile(selectedPath);
            contextMenu.style.display = 'none';
        });

        document.getElementById('ctx-folder').addEventListener('click', () => {
            if (selectedPath) window.chrome.webview.hostObjects.sync.echo.OpenInFolder(selectedPath);
            contextMenu.style.display = 'none';
        });

        // Hide context menu on click elsewhere
        document.addEventListener('click', () => {
            contextMenu.style.display = 'none';
        });
    </script>
</body>
</html>
